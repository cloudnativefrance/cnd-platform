apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnd-photos
  namespace: flux-system
spec:
  prune: true
  interval: 2m0s
  path: ./communication/photos
  dependsOn:
    - name: cnd-operators
  sourceRef:
    kind: GitRepository
    name: customer
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: museum
      namespace: cnd-photos
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: cnpg-ente
      namespace: cnd-photos
