---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website
  namespace: cnd-website
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: public
  rules:
    - host: cloudnativedays.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  name: http
    - host: www.cloudnativedays.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  name: http
  tls:
    - hosts:
        - cloudnativedays.fr
        - www.cloudnativedays.fr
      secretName: website-tls
